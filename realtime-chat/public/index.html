<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<title>Node.js Chat</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#ece5dd;
}

.header{
    background:#075e54;
    color:white;
    padding:15px;
    font-size:20px;
}

.online{
    font-size:13px;
    margin-top:5px;
}

#messages{
    height:80vh;
    overflow-y:auto;
    padding:15px;
    list-style:none;
}

.message{
    max-width:60%;
    padding:10px;
    margin:8px;
    border-radius:10px;
    word-wrap:break-word;
}

.me{
    background:#dcf8c6;
    margin-left:auto;
}

.other{
    background:white;
}

.system{
    text-align:center;
    color:gray;
    margin:10px;
}

.username{
    font-weight:bold;
    color:#075e54;
}

form{
    display:flex;
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
}

button{
    border:none;
    background:#25d366;
    color:white;
    padding:15px 25px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    Node.js Chat
    <div class="online" id="online">
        Online: 0
    </div>
</div>

<ul id="messages"></ul>

<form id="form">
    <input
        id="input"
        placeholder="Mesaj yaz..."
        autocomplete="off"
    >
    <button>Gönder</button>
</form>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const username =
prompt("İsminizi girin:");

socket.emit("join", username);

const messages =
document.getElementById("messages");

const form =
document.getElementById("form");

const input =
document.getElementById("input");

form.addEventListener("submit",(e)=>{

    e.preventDefault();

    if(input.value){

        socket.emit(
            "chat message",
            {
                user: username,
                text: input.value
            }
        );

        input.value="";
    }

});

socket.on("online count",(count)=>{
    document.getElementById("online")
    .innerText =
    "Online: " + count;
});

socket.on("system message",(msg)=>{

    const div =
    document.createElement("div");

    div.className="system";

    div.innerText=msg;

    messages.appendChild(div);

});

socket.on("chat message",(data)=>{

    const li =
    document.createElement("li");

    li.className =
    "message " +
    (data.user===username
    ? "me"
    : "other");

    li.innerHTML =
    `<div class="username">
        ${data.user}
     </div>
     <div>
        ${data.text}
     </div>`;

    messages.appendChild(li);

    window.scrollTo(
        0,
        document.body.scrollHeight
    );

});

</script>

</body>
</html>
